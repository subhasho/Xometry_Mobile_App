# Policy: every push to main runs Maven compile; mobile E2E is best-effort and does not fail the workflow.
# - compile: always runs and must pass for a green workflow (if it is a required check).
# - appium-emulator-e2e: skipped when APPIUM_E2E_APK_URL is missing; otherwise runs emulator + Appium + testng.xml.
#   If the emulator, Appium, or tests fail, this job is marked failed but the overall workflow still succeeds
#   (continue-on-error). Add other jobs with needs: [compile] only — do not gate deploy on appium-emulator-e2e.
#
# Optional repository variables: APPIUM_APP_PACKAGE, APPIUM_APP_ACTIVITY (must match the APK).
#
# Branch protection: mark only checks you require (e.g. "Maven test-compile"), not the E2E job, if merges should not block on E2E.

name: CI — Main

permissions:
  contents: read

on:
  push:
    branches: [main]
  workflow_dispatch:

# Do not cancel a long emulator run when another push lands — each push still queues a new run.
concurrency:
  group: ci-main-${{ github.ref }}
  cancel-in-progress: false

env:
  TESTNG_SUITE: testng.xml

jobs:
  compile:
    name: Maven test-compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Compile test sources
        run: mvn -B -f appiumtests/pom.xml test-compile

  appium-emulator-e2e:
    name: Appium E2E (Android emulator + testng.xml)
    needs: compile
    # Emulator / Appium / UI failures do not turn the whole workflow red (other pipelines or jobs stay unblocked).
    continue-on-error: true
    runs-on: ubuntu-latest
    # Tests + OPC on a cold emulator often exceeds 90m (boot, APK, long UI flow).
    timeout-minutes: 150
    steps:
      - uses: actions/checkout@v4

      - name: E2E gate — APK URL configured?
        id: gate
        shell: bash
        env:
          APK_URL: ${{ secrets.APPIUM_E2E_APK_URL }}
        run: |
          if [ -z "${APK_URL}" ]; then
            echo "::notice::Skipping Appium E2E: secret APPIUM_E2E_APK_URL is not set. Configure it to run tests on the emulator."
            echo "run=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi
          echo "run=true" >> "${GITHUB_OUTPUT}"

      - uses: actions/setup-java@v4
        if: steps.gate.outputs.run == 'true'
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - uses: actions/setup-node@v4
        if: steps.gate.outputs.run == 'true'
        with:
          node-version: "20"

      # ubuntu-latest already includes Maven + curl (see actions/runner-images). No apt on every run.
      - name: Enable KVM for emulator acceleration
        if: steps.gate.outputs.run == 'true'
        shell: bash
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - uses: reactivecircus/android-emulator-runner@v2
        if: steps.gate.outputs.run == 'true'
        with:
          # Full google_apis (better app compatibility than ATD). Snapshot flags avoid default_boot offline loops.
          api-level: 30
          arch: x86_64
          target: google_apis
          cores: 2
          ram-size: 2048M
          emulator-boot-timeout: 1200
          disable-animations: true
          emulator-options: -no-snapshot-load -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          script: bash scripts/ci-emulator-e2e.sh
        env:
          APK_URL: ${{ secrets.APPIUM_E2E_APK_URL }}
          TESTNG_SUITE: ${{ env.TESTNG_SUITE }}
          APPIUM_APP_PACKAGE: ${{ vars.APPIUM_APP_PACKAGE }}
          APPIUM_APP_ACTIVITY: ${{ vars.APPIUM_APP_ACTIVITY }}
          APPIUM_ONLY_EMULATOR: "true"
          APPIUM_PLATFORM_VERSION: "11"

      - name: Validate TestNG results (fails this job only; workflow still OK)
        if: always() && steps.gate.outputs.run == 'true'
        shell: bash
        run: python3 scripts/validate-testng-for-deployment.py appiumtests/target/surefire-reports/testng-results.xml

      - name: Upload emulator artifacts
        if: always() && steps.gate.outputs.run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: appium-artifacts-emulator
          path: |
            appium.log
            appiumtests/test-output/**
            appiumtests/Screenshots/**
            appiumtests/target/surefire-reports/**
