# Every push to main: compile tests, then run full testng.xml (Tests + OPC) on an Android emulator.
#
# Required: repository secret APPIUM_E2E_APK_URL — direct HTTPS URL to the .apk file.
# Optional variables: APPIUM_APP_PACKAGE, APPIUM_APP_ACTIVITY (must match the APK).
#
# If nothing runs on push: GitHub → Actions → CI — Main → enable workflow (it must not be "disabled").

name: CI — Main

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-main-${{ github.ref }}
  cancel-in-progress: true

env:
  TESTNG_SUITE: testng.xml

jobs:
  compile:
    name: Maven test-compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Compile test sources
        run: mvn -B -f appiumtests/pom.xml test-compile

  appium-emulator-e2e:
    name: Appium E2E (Android emulator + testng.xml)
    needs: compile
    runs-on: ubuntu-latest
    # Tests + OPC on a cold emulator often exceeds 90m (boot, APK, long UI flow).
    timeout-minutes: 150
    steps:
      - uses: actions/checkout@v4

      - name: Require APK download URL (secret)
        shell: bash
        env:
          APK_URL: ${{ secrets.APPIUM_E2E_APK_URL }}
        run: |
          if [ -z "${APK_URL}" ]; then
            echo "::error::Set repository secret APPIUM_E2E_APK_URL (Settings → Secrets and variables → Actions). Use a direct HTTPS link to your .apk (e.g. upload to a Release or artifact store). Without this secret, the emulator cannot install the app and tests will not run."
            exit 1
          fi

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      # ubuntu-latest already includes Maven + curl (see actions/runner-images). No apt on every run.

      - uses: reactivecircus/android-emulator-runner@v2
        with:
          # google_atd = smaller Automated Test Device image (faster cold boot than full google_apis).
          # -no-snapshot-load avoids broken/missing default_boot snapshot loops that leave adb "offline".
          api-level: 31
          arch: x86_64
          target: google_atd
          cores: 2
          ram-size: 2048M
          emulator-boot-timeout: 1200
          disable-animations: true
          emulator-options: -no-snapshot-load -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          script: bash scripts/ci-emulator-e2e.sh
        env:
          APK_URL: ${{ secrets.APPIUM_E2E_APK_URL }}
          TESTNG_SUITE: ${{ env.TESTNG_SUITE }}
          APPIUM_APP_PACKAGE: ${{ vars.APPIUM_APP_PACKAGE }}
          APPIUM_APP_ACTIVITY: ${{ vars.APPIUM_APP_ACTIVITY }}
          APPIUM_ONLY_EMULATOR: "true"
          APPIUM_PLATFORM_VERSION: "12"

      - name: Summarize TestNG pass / fail / skip
        if: always()
        shell: bash
        run: python3 scripts/summarize-testng-results.py appiumtests/target/surefire-reports/testng-results.xml

      - name: Upload emulator artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appium-artifacts-emulator
          path: |
            appium.log
            appiumtests/test-output/**
            appiumtests/Screenshots/**
            appiumtests/target/surefire-reports/**
