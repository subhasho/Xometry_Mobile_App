# Fast compile-only check. Full Appium E2E runs on an Android emulator in
# .github/workflows/mobile-e2e-appium.yml (push to main).

name: Main — Maven test-compile

on:
  push:
    branches: [main]
    paths:
      - "appiumtests/**"
      - ".github/workflows/main.yml"
  workflow_dispatch:

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Compile
        run: mvn -B -f appiumtests/pom.xml test-compile
