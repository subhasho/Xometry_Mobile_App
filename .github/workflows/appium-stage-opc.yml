# -----------------------------------------------------------------------------
# Stage — validate all OPC tests against the stage app build
#
# Use when: a new build is deployed to stage and you want to execute/validate
# every OPC test case (plus login first if using testng.xml).
#
# Requires: a self-hosted runner on a machine that has:
#   - Appium server (e.g. http://127.0.0.1:4723 — see Tests.BaseClass)
#   - Android device or emulator with the stage APK / same package as BaseClass
#   - JDK 17, Maven
#
# Default suite: testng.xml  → Tests.Tests (login) then Tests.OPC (all OPC cases).
# Alternative:   testng-opc-only.xml  → OPC only (needs an already signed-in session; often noReset).
#
# Trigger from a deploy pipeline (GitHub API, PAT with repo scope):
#   POST /repos/OWNER/REPO/dispatches
#   { "event_type": "stage-opc-validate", "client_payload": { "suite_file": "testng.xml" } }
#
# Called from deploy-stage.yml as the OPC quality gate before stage deploy (workflow_call).
# -----------------------------------------------------------------------------

name: Stage — OPC validation

on:
  workflow_dispatch:
    inputs:
      suite_file:
        description: "TestNG XML under appiumtests/ (testng.xml = login + all OPC)"
        required: true
        default: testng.xml
        type: string

  repository_dispatch:
    types: [stage-opc-validate]

  workflow_call:
    inputs:
      suite_file:
        description: "TestNG XML under appiumtests/"
        type: string
        default: testng.xml

jobs:
  opc-stage-e2e:
    name: Run OPC suite (self-hosted)
    runs-on: self-hosted
    defaults:
      run:
        working-directory: appiumtests
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Resolve TestNG suite file
        id: suite
        run: |
          SUITE=""
          EVENT="${{ github.event_name }}"
          if [ "$EVENT" = "workflow_dispatch" ]; then
            SUITE="${{ github.event.inputs.suite_file }}"
          elif [ "$EVENT" = "workflow_call" ]; then
            SUITE="${{ inputs.suite_file }}"
          else
            SUITE="${{ github.event.client_payload.suite_file }}"
          fi
          if [ -z "$SUITE" ] || [ "$SUITE" = "null" ]; then
            SUITE="testng.xml"
          fi
          echo "Using suite: $SUITE"
          echo "suite_file=$SUITE" >> "$GITHUB_OUTPUT"

      - name: Compile tests
        run: mvn -B test-compile

      - name: Run Appium / TestNG (stage)
        run: mvn -B test "-Dsurefire.suiteXmlFiles=${{ steps.suite.outputs.suite_file }}"

      - name: Upload Surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports-stage-opc-${{ github.run_id }}
          path: appiumtests/target/surefire-reports/
