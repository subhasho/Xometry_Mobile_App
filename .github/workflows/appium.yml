# Appium / OPC — CI
#
# - Every push/PR:
#   1) opc-suite — confirms Tests.OPC is on disk and wired in testng.xml (and opc-only XML exists).
#   2) compile — mvn test-compile (includes OPC.java with the rest of appiumtests).
# - Manual "Run workflow": optional E2E on a self-hosted runner (Appium + device; run testng.xml or testng-opc-only.xml).
#
# Self-hosted: Appium 2, UiAutomator2, JDK 17, adb/device; runner registered on that machine.

name: Appium

on:
  push:
    paths:
      - "appiumtests/**"
      - ".github/workflows/appium.yml"
  pull_request:
    paths:
      - "appiumtests/**"
      - ".github/workflows/appium.yml"
  workflow_dispatch:
    inputs:
      suite_file:
        description: "TestNG suite file under appiumtests/ (e.g. testng.xml, testng-opc-only.xml)"
        required: true
        default: "testng.xml"
        type: string
      run_e2e:
        description: "Run mvn test on self-hosted runner (requires Appium + device)"
        required: true
        default: false
        type: boolean

jobs:
  opc-suite:
    name: OPC — wired in TestNG
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify Tests.OPC source and suite files
        run: |
          set -e
          test -f appiumtests/src/test/java/Tests/OPC.java
          grep -q 'class name="Tests.OPC"' appiumtests/testng.xml
          grep -q 'Tests.OPC' appiumtests/testng.xml
          test -f appiumtests/testng-opc-only.xml
          grep -q 'Tests.OPC' appiumtests/testng-opc-only.xml
          echo "OK: OPC class present; testng.xml and testng-opc-only.xml reference Tests.OPC"

  compile:
    name: Compile (JDK 17)
    needs: opc-suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Compile test sources (includes Tests.OPC)
        run: mvn -B -f appiumtests/pom.xml test-compile

  opc-e2e:
    name: OPC / Appium E2E (self-hosted)
    needs: compile
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.run_e2e == 'true' }}
    runs-on: self-hosted
    defaults:
      run:
        working-directory: appiumtests

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Run TestNG suite
        run: mvn -B test "-Dsurefire.suiteXmlFiles=${{ github.event.inputs.suite_file }}"

      - name: Upload Surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: appiumtests/target/surefire-reports/
