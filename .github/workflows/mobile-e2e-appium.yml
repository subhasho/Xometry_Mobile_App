# Mobile E2E (Appium + TestNG)
#
# Every push to main runs:
# 1) appium-emulator-e2e — GitHub-hosted Android emulator + Appium + mvn testng.xml (no USB phone).
#    Add repository secret APPIUM_E2E_APK_URL = direct URL to the stage .apk so the app installs on the AVD.
#    Set SKIP_EMULATOR_E2E_ON_PUSH=true to disable this job.
# 2) appium-self-hosted-device — your USB phone, only when a self-hosted runner is online (may Queue).
#    Set SKIP_DEVICE_E2E_ON_PUSH=true to disable on push.
# 3) appium-ubuntu-smoke — quick ubuntu checks (rarely has a device).
#
# testng.xml: Tests.AppiumSuiteListener + alwaysRun on dependent tests.

name: Mobile E2E (Appium)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  TESTNG_SUITE: testng.xml

jobs:
  # ---------------------------------------------------------------------------
  # GitHub cloud: no physical device — keeps quick signal / artifacts when adb works.
  # ---------------------------------------------------------------------------
  appium-ubuntu-smoke:
    name: Appium (ubuntu — device optional)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install adb
        id: adb
        shell: bash
        continue-on-error: true
        run: |
          if sudo apt-get update && sudo apt-get install -y android-tools-adb; then
            echo "adb_ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "adb_ready=false" >> "$GITHUB_OUTPUT"
            echo "adb installation failed; continuing with graceful skip mode."
          fi

      - name: Ensure Appium + driver available (no reinstall if present)
        id: appium_setup
        shell: bash
        continue-on-error: true
        run: |
          if npm i -g appium@latest && appium -v; then
            if ! appium driver list --installed | grep -q uiautomator2; then
              appium driver install uiautomator2
            fi
            echo "cli_ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "cli_ready=false" >> "$GITHUB_OUTPUT"
            echo "Appium setup failed; continuing with graceful skip mode."
          fi

      - name: Check runner dependencies
        shell: bash
        run: |
          echo "Runner: $RUNNER_NAME / $RUNNER_OS / $RUNNER_ARCH"
          java -version || true
          mvn -version || true
          node -v || true
          npm -v || true
          adb version || true
          appium -v || true
          appium driver list --installed || true

      - name: Verify device connected
        id: device
        if: ${{ steps.adb.outputs.adb_ready == 'true' }}
        shell: bash
        continue-on-error: true
        run: |
          echo "connected=false" >> "$GITHUB_OUTPUT"
          adb start-server || true
          DEVICES="$(adb devices)"
          echo "$DEVICES"
          if echo "$DEVICES" | grep -q $'\tdevice'; then
            echo "connected=true" >> "$GITHUB_OUTPUT"
          else
            echo "connected=false" >> "$GITHUB_OUTPUT"
            echo "No authorized Android device connected. Skipping tests gracefully."
          fi

      - name: Start Appium server
        id: appium
        if: ${{ steps.device.outputs.connected == 'true' && steps.appium_setup.outputs.cli_ready == 'true' }}
        shell: bash
        continue-on-error: true
        run: |
          nohup appium --base-path /wd/hub > appium.log 2>&1 &
          sleep 8
          if curl -fsS "http://127.0.0.1:4723/wd/hub/status" > /dev/null; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Appium tests (non-blocking)
        if: ${{ steps.device.outputs.connected == 'true' && steps.appium.outputs.ready == 'true' }}
        shell: bash
        continue-on-error: true
        run: |
          mvn -f appiumtests/pom.xml test -Dsurefire.suiteXmlFiles="${TESTNG_SUITE}"

      - name: Skip note when prerequisites unavailable
        if: ${{ steps.adb.outputs.adb_ready != 'true' || steps.appium_setup.outputs.cli_ready != 'true' || steps.device.outputs.connected != 'true' || steps.appium.outputs.ready != 'true' }}
        shell: bash
        run: |
          echo "Skipping Appium tests because required runtime prerequisites are unavailable."

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appium-artifacts-ubuntu
          path: |
            appium.log
            appiumtests/test-output/**
            appiumtests/Screenshots/**

  # ---------------------------------------------------------------------------
  # GitHub-hosted Android emulator — runs testng.xml on EVERY push (no self-hosted runner).
  # ---------------------------------------------------------------------------
  appium-emulator-e2e:
    name: Appium E2E (Android emulator + testng.xml)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    if: ${{ vars.SKIP_EMULATOR_E2E_ON_PUSH != 'true' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Maven and curl
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y maven curl

      - uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          arch: x86_64
          target: google_apis
          disable-animations: true
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          script: bash scripts/ci-emulator-e2e.sh
        env:
          APK_URL: ${{ secrets.APPIUM_E2E_APK_URL }}
          TESTNG_SUITE: ${{ env.TESTNG_SUITE }}

      - name: Upload emulator artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appium-artifacts-emulator
          path: |
            appium.log
            appiumtests/test-output/**
            appiumtests/Screenshots/**
            appiumtests/target/surefire-reports/**

  # ---------------------------------------------------------------------------
  # Self-hosted PC with USB device — this is how you run full testng.xml on a real phone.
  # ---------------------------------------------------------------------------
  appium-self-hosted-device:
    name: Appium E2E (self-hosted + device, testng.xml)
    runs-on: self-hosted
    timeout-minutes: 120
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && vars.SKIP_DEVICE_E2E_ON_PUSH != 'true')
    env:
      # Optional overrides for BaseClass (see appiumtests/src/test/java/Tests/BaseClass.java)
      APPIUM_UDID: ${{ vars.APPIUM_UDID }}
      APPIUM_DEVICE_NAME: ${{ vars.APPIUM_DEVICE_NAME }}
      APPIUM_PLATFORM_NAME: ${{ vars.APPIUM_PLATFORM_NAME }}
      APPIUM_PLATFORM_VERSION: ${{ vars.APPIUM_PLATFORM_VERSION }}
      APK_PATH: ${{ vars.APK_PATH }}
      APPIUM_HOST: ${{ vars.APPIUM_HOST }}
      APPIUM_PORT: ${{ vars.APPIUM_PORT }}
      APPIUM_BASE_PATH: ${{ vars.APPIUM_BASE_PATH }}
      APPIUM_URL: ${{ secrets.APPIUM_URL }}
    steps:
      - uses: actions/checkout@v4

      - name: Why this job may not hit your phone every time (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          echo "::notice::Device E2E runs ONLY on self-hosted runners (this machine). GitHub-hosted ubuntu cannot use USB."
          echo "Runner: $RUNNER_NAME | OS=$RUNNER_OS | Event=$GITHUB_EVENT_NAME | Ref=$GITHUB_REF"

      - name: Why this job may not hit your phone every time (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          Write-Host "::notice::Device E2E runs ONLY on self-hosted runners (this machine). GitHub-hosted ubuntu cannot use USB."
          Write-Host "Runner=$env:RUNNER_NAME OS=$env:RUNNER_OS Event=$env:GITHUB_EVENT_NAME Ref=$env:GITHUB_REF"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run TestNG suite on device (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: bash scripts/run-appium-device-e2e.sh

      - name: Run TestNG suite on device (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          & powershell -NoProfile -ExecutionPolicy Bypass -File "$env:GITHUB_WORKSPACE\scripts\run-appium-device-e2e.ps1"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appium-artifacts-self-hosted
          path: |
            appium.log
            appiumtests/test-output/**
            appiumtests/Screenshots/**
            appiumtests/target/surefire-reports/**
