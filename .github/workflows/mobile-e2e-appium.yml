# Manual run: same emulator + Appium + testng.xml as main.yml. Non-blocking for other workflows.
# If APPIUM_E2E_APK_URL is missing, E2E steps are skipped. Job uses continue-on-error so infra/test failures do not fail the workflow run.

name: Mobile E2E (manual — emulator only)

on:
  workflow_dispatch:

env:
  TESTNG_SUITE: testng.xml

jobs:
  appium-emulator-e2e:
    name: Appium E2E (Android emulator + testng.xml)
    continue-on-error: true
    runs-on: ubuntu-latest
    timeout-minutes: 150
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: E2E gate — APK URL configured?
        id: gate
        shell: bash
        env:
          APK_URL: ${{ secrets.APPIUM_E2E_APK_URL }}
        run: |
          if [ -z "${APK_URL}" ]; then
            echo "::notice::Skipping Appium E2E: secret APPIUM_E2E_APK_URL is not set."
            echo "run=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi
          echo "run=true" >> "${GITHUB_OUTPUT}"

      - uses: actions/setup-java@v4
        if: steps.gate.outputs.run == 'true'
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - uses: actions/setup-node@v4
        if: steps.gate.outputs.run == 'true'
        with:
          node-version: "20"

      - name: Compile tests
        if: steps.gate.outputs.run == 'true'
        shell: bash
        run: mvn -B -f appiumtests/pom.xml test-compile

      - name: Enable KVM for emulator acceleration
        if: steps.gate.outputs.run == 'true'
        shell: bash
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - uses: reactivecircus/android-emulator-runner@v2
        if: steps.gate.outputs.run == 'true'
        with:
          api-level: 30
          arch: x86_64
          target: google_apis
          cores: 2
          ram-size: 2048M
          emulator-boot-timeout: 1200
          disable-animations: true
          emulator-options: -no-snapshot-load -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          script: bash scripts/ci-emulator-e2e.sh
        env:
          APK_URL: ${{ secrets.APPIUM_E2E_APK_URL }}
          TESTNG_SUITE: ${{ env.TESTNG_SUITE }}
          APPIUM_APP_PACKAGE: ${{ vars.APPIUM_APP_PACKAGE }}
          APPIUM_APP_ACTIVITY: ${{ vars.APPIUM_APP_ACTIVITY }}
          APPIUM_ONLY_EMULATOR: "true"
          APPIUM_PLATFORM_VERSION: "11"

      - name: Validate TestNG results (fails this job only; workflow still OK)
        if: always() && steps.gate.outputs.run == 'true'
        shell: bash
        run: python3 scripts/validate-testng-for-deployment.py appiumtests/target/surefire-reports/testng-results.xml

      - name: Upload emulator artifacts
        if: always() && steps.gate.outputs.run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: appium-artifacts-emulator-manual
          path: |
            appium.log
            appiumtests/test-output/**
            appiumtests/Screenshots/**
            appiumtests/target/surefire-reports/**
