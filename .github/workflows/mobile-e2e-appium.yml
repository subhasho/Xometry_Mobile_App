name: Mobile E2E (Appium)

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  gate:
    runs-on: ubuntu-latest
    outputs:
      run_tests: ${{ steps.flag.outputs.run_tests }}
    steps:
      - id: flag
        shell: bash
        run: |
          EVENT="${{ github.event_name }}"
          MSG="${{ github.event.head_commit.message || '' }}"
          TITLE="${{ github.event.pull_request.title || '' }}"
          TEXT="$MSG $TITLE"
          if [[ "$EVENT" == "workflow_dispatch" ]]; then
            echo "run_tests=true" >> "$GITHUB_OUTPUT"
          elif [[ "$TEXT" == *"[Run Tests]"* ]]; then
            echo "run_tests=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_tests=false" >> "$GITHUB_OUTPUT"
          fi
          echo "Event: $EVENT"
          echo "Trigger text: $TEXT"

  appium-tests:
    needs: gate
    if: needs.gate.outputs.run_tests == 'true'
    runs-on: [self-hosted, windows, mobile, appium]
    timeout-minutes: 60
    env:
      TESTNG_SUITE: testng.xml
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Appium + driver
        shell: powershell
        continue-on-error: true
        run: |
          npm i -g appium@latest
          appium driver install uiautomator2
          appium -v

      - name: Verify device connected
        id: device
        shell: powershell
        continue-on-error: true
        run: |
          adb start-server
          $devices = adb devices
          $devices
          if (-not ($devices | Select-String "`tdevice")) {
            throw "No authorized Android device connected."
          }

      - name: Start Appium server
        id: appium
        if: ${{ steps.device.outcome == 'success' }}
        shell: powershell
        continue-on-error: true
        run: |
          Start-Process -FilePath "appium" -ArgumentList "--base-path /wd/hub" -RedirectStandardOutput "appium.log" -RedirectStandardError "appium.log"
          Start-Sleep -Seconds 8
          Invoke-WebRequest "http://127.0.0.1:4723/wd/hub/status" -UseBasicParsing | Out-Null

      - name: Run Appium tests (non-blocking)
        shell: powershell
        continue-on-error: true
        run: |
          try {
            Invoke-WebRequest "http://127.0.0.1:4723/wd/hub/status" -UseBasicParsing | Out-Null
          } catch {
            Write-Host "Appium not reachable; skipping TestNG execution."
            exit 0
          }
          mvn -f appiumtests/pom.xml test -Dsurefire.suiteXmlFiles=$env:TESTNG_SUITE

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appium-artifacts
          path: |
            appium.log
            appiumtests/test-output/**
            appiumtests/Screenshots/**
