# Optional manual run of the same emulator + Appium + testng.xml job as main.yml (workflow_dispatch only).
# Push to main still runs the full suite automatically via CI — Main; this file does not add commit-message conditions.

name: Mobile E2E (manual — emulator only)

on:
  workflow_dispatch:

env:
  TESTNG_SUITE: testng.xml

jobs:
  appium-emulator-e2e:
    name: Appium E2E (Android emulator + testng.xml)
    runs-on: ubuntu-latest
    timeout-minutes: 150
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Require APK download URL (secret)
        shell: bash
        env:
          APK_URL: ${{ secrets.APPIUM_E2E_APK_URL }}
        run: |
          if [ -z "${APK_URL}" ]; then
            echo "::error::Set secret APPIUM_E2E_APK_URL on the repository."
            exit 1
          fi

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Compile tests
        shell: bash
        run: mvn -B -f appiumtests/pom.xml test-compile

      - name: Enable KVM for emulator acceleration
        shell: bash
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          arch: x86_64
          target: google_apis
          cores: 2
          ram-size: 2048M
          emulator-boot-timeout: 1200
          disable-animations: true
          emulator-options: -no-snapshot-load -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          script: bash scripts/ci-emulator-e2e.sh
        env:
          APK_URL: ${{ secrets.APPIUM_E2E_APK_URL }}
          TESTNG_SUITE: ${{ env.TESTNG_SUITE }}
          APPIUM_APP_PACKAGE: ${{ vars.APPIUM_APP_PACKAGE }}
          APPIUM_APP_ACTIVITY: ${{ vars.APPIUM_APP_ACTIVITY }}
          APPIUM_ONLY_EMULATOR: "true"
          APPIUM_PLATFORM_VERSION: "11"

      - name: Fail job if emulator E2E had failures or no passes
        if: always()
        shell: bash
        run: python3 scripts/validate-testng-for-deployment.py appiumtests/target/surefire-reports/testng-results.xml

      - name: Upload emulator artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appium-artifacts-emulator-manual
          path: |
            appium.log
            appiumtests/test-output/**
            appiumtests/Screenshots/**
            appiumtests/target/surefire-reports/**
