# Optional manual runs: self-hosted USB device, or a second manual emulator run.
# Default CI (every push to main) is in .github/workflows/main.yml — compile + emulator E2E.

name: Mobile E2E (manual)

on:
  workflow_dispatch:

env:
  TESTNG_SUITE: testng.xml

jobs:
  appium-emulator-e2e:
    name: Appium E2E (Android emulator + testng.xml)
    runs-on: ubuntu-latest
    timeout-minutes: 150
    steps:
      - uses: actions/checkout@v4

      - name: Require APK download URL (secret)
        shell: bash
        env:
          APK_URL: ${{ secrets.APPIUM_E2E_APK_URL }}
        run: |
          if [ -z "${APK_URL}" ]; then
            echo "::error::Set secret APPIUM_E2E_APK_URL on the repository."
            exit 1
          fi

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Compile tests
        shell: bash
        run: mvn -B -f appiumtests/pom.xml test-compile

      - uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 31
          arch: x86_64
          target: google_atd
          cores: 2
          ram-size: 2048M
          emulator-boot-timeout: 1200
          disable-animations: true
          emulator-options: -no-snapshot-load -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          script: bash scripts/ci-emulator-e2e.sh
        env:
          APK_URL: ${{ secrets.APPIUM_E2E_APK_URL }}
          TESTNG_SUITE: ${{ env.TESTNG_SUITE }}
          APPIUM_APP_PACKAGE: ${{ vars.APPIUM_APP_PACKAGE }}
          APPIUM_APP_ACTIVITY: ${{ vars.APPIUM_APP_ACTIVITY }}
          APPIUM_ONLY_EMULATOR: "true"
          APPIUM_PLATFORM_VERSION: "12"

      - name: Upload emulator artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appium-artifacts-emulator-manual
          path: |
            appium.log
            appiumtests/test-output/**
            appiumtests/Screenshots/**
            appiumtests/target/surefire-reports/**

  appium-self-hosted-device:
    name: Appium E2E (self-hosted + USB device)
    runs-on: self-hosted
    timeout-minutes: 120
    if: vars.RUN_SELF_HOSTED_DEVICE_E2E_ON_PUSH == 'true'
    env:
      APPIUM_UDID: ${{ vars.APPIUM_UDID }}
      APPIUM_DEVICE_NAME: ${{ vars.APPIUM_DEVICE_NAME }}
      APPIUM_PLATFORM_NAME: ${{ vars.APPIUM_PLATFORM_NAME }}
      APPIUM_PLATFORM_VERSION: ${{ vars.APPIUM_PLATFORM_VERSION }}
      APK_PATH: ${{ vars.APK_PATH }}
      APPIUM_HOST: ${{ vars.APPIUM_HOST }}
      APPIUM_PORT: ${{ vars.APPIUM_PORT }}
      APPIUM_BASE_PATH: ${{ vars.APPIUM_BASE_PATH }}
      APPIUM_URL: ${{ secrets.APPIUM_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run TestNG suite on device (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: bash scripts/run-appium-device-e2e.sh

      - name: Run TestNG suite on device (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          & powershell -NoProfile -ExecutionPolicy Bypass -File "$env:GITHUB_WORKSPACE\scripts\run-appium-device-e2e.ps1"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appium-artifacts-self-hosted
          path: |
            appium.log
            appiumtests/test-output/**
            appiumtests/Screenshots/**
            appiumtests/target/surefire-reports/**
