# Mobile E2E (Appium + TestNG)
#
# testng.xml (Tests.Tests + Tests.OPC) needs a real Android session: ADB device + Appium.
# GitHub-hosted ubuntu-latest cannot attach a USB phone, so that job only runs tests when
# a device is accidentally present (almost never).
#
# To run ALL tests from testng.xml on your phone in CI:
# 1. On the PC that has USB debugging enabled and the device connected, install:
#    Java 17, Maven, Node 20, Android platform-tools (adb), Appium + uiautomator2 driver.
# 2. Register a GitHub self-hosted runner on that machine (Settings → Actions → Runners).
# 3. Set repository Variables (Settings → Secrets and variables → Actions → Variables):
#    APPIUM_UDID, APPIUM_DEVICE_NAME, APPIUM_PLATFORM_VERSION (match your device)
#    APK_PATH — absolute path to the .apk on the runner (or omit if app already installed)
# 4. Every push to main (including empty commits) runs job appium-self-hosted-device — keep a
#    self-hosted runner online with the phone connected, or that job will stay queued / fail.
#    To turn off device runs on push only, set variable SKIP_DEVICE_E2E_ON_PUSH=true.

name: Mobile E2E (Appium)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  TESTNG_SUITE: testng.xml

jobs:
  # ---------------------------------------------------------------------------
  # GitHub cloud: no physical device — keeps quick signal / artifacts when adb works.
  # ---------------------------------------------------------------------------
  appium-ubuntu-smoke:
    name: Appium (ubuntu — device optional)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install adb
        id: adb
        shell: bash
        continue-on-error: true
        run: |
          if sudo apt-get update && sudo apt-get install -y android-tools-adb; then
            echo "adb_ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "adb_ready=false" >> "$GITHUB_OUTPUT"
            echo "adb installation failed; continuing with graceful skip mode."
          fi

      - name: Ensure Appium + driver available (no reinstall if present)
        id: appium_setup
        shell: bash
        continue-on-error: true
        run: |
          if npm i -g appium@latest && appium -v; then
            if ! appium driver list --installed | grep -q uiautomator2; then
              appium driver install uiautomator2
            fi
            echo "cli_ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "cli_ready=false" >> "$GITHUB_OUTPUT"
            echo "Appium setup failed; continuing with graceful skip mode."
          fi

      - name: Check runner dependencies
        shell: bash
        run: |
          echo "Runner: $RUNNER_NAME / $RUNNER_OS / $RUNNER_ARCH"
          java -version || true
          mvn -version || true
          node -v || true
          npm -v || true
          adb version || true
          appium -v || true
          appium driver list --installed || true

      - name: Verify device connected
        id: device
        if: ${{ steps.adb.outputs.adb_ready == 'true' }}
        shell: bash
        continue-on-error: true
        run: |
          echo "connected=false" >> "$GITHUB_OUTPUT"
          adb start-server || true
          DEVICES="$(adb devices)"
          echo "$DEVICES"
          if echo "$DEVICES" | grep -q $'\tdevice'; then
            echo "connected=true" >> "$GITHUB_OUTPUT"
          else
            echo "connected=false" >> "$GITHUB_OUTPUT"
            echo "No authorized Android device connected. Skipping tests gracefully."
          fi

      - name: Start Appium server
        id: appium
        if: ${{ steps.device.outputs.connected == 'true' && steps.appium_setup.outputs.cli_ready == 'true' }}
        shell: bash
        continue-on-error: true
        run: |
          nohup appium --base-path /wd/hub > appium.log 2>&1 &
          sleep 8
          if curl -fsS "http://127.0.0.1:4723/wd/hub/status" > /dev/null; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Appium tests (non-blocking)
        if: ${{ steps.device.outputs.connected == 'true' && steps.appium.outputs.ready == 'true' }}
        shell: bash
        continue-on-error: true
        run: |
          mvn -f appiumtests/pom.xml test -Dsurefire.suiteXmlFiles="${TESTNG_SUITE}"

      - name: Skip note when prerequisites unavailable
        if: ${{ steps.adb.outputs.adb_ready != 'true' || steps.appium_setup.outputs.cli_ready != 'true' || steps.device.outputs.connected != 'true' || steps.appium.outputs.ready != 'true' }}
        shell: bash
        run: |
          echo "Skipping Appium tests because required runtime prerequisites are unavailable."

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appium-artifacts-ubuntu
          path: |
            appium.log
            appiumtests/test-output/**
            appiumtests/Screenshots/**

  # ---------------------------------------------------------------------------
  # Self-hosted PC with USB device — this is how you run full testng.xml on a real phone.
  # ---------------------------------------------------------------------------
  appium-self-hosted-device:
    name: Appium E2E (self-hosted + device, testng.xml)
    runs-on: self-hosted
    timeout-minutes: 120
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && vars.SKIP_DEVICE_E2E_ON_PUSH != 'true')
    env:
      # Optional overrides for BaseClass (see appiumtests/src/test/java/Tests/BaseClass.java)
      APPIUM_UDID: ${{ vars.APPIUM_UDID }}
      APPIUM_DEVICE_NAME: ${{ vars.APPIUM_DEVICE_NAME }}
      APPIUM_PLATFORM_NAME: ${{ vars.APPIUM_PLATFORM_NAME }}
      APPIUM_PLATFORM_VERSION: ${{ vars.APPIUM_PLATFORM_VERSION }}
      APK_PATH: ${{ vars.APK_PATH }}
      APPIUM_HOST: ${{ vars.APPIUM_HOST }}
      APPIUM_PORT: ${{ vars.APPIUM_PORT }}
      APPIUM_BASE_PATH: ${{ vars.APPIUM_BASE_PATH }}
      APPIUM_URL: ${{ secrets.APPIUM_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Require adb and authorized device
        shell: bash
        run: |
          set -euo pipefail
          command -v adb >/dev/null 2>&1 || { echo "::error::adb not found on PATH. Install Android platform-tools on the self-hosted runner."; exit 1; }
          adb start-server
          echo "adb devices:"
          adb devices
          if ! adb devices | grep -q $'\tdevice'; then
            echo "::error::No Android device in 'device' state. Enable USB debugging, authorize RSA, and keep the phone connected."
            exit 1
          fi

      - name: Ensure Appium CLI and UiAutomator2 driver
        shell: bash
        run: |
          set -euo pipefail
          npm i -g appium@latest
          appium -v
          if ! appium driver list --installed | grep -q uiautomator2; then
            appium driver install uiautomator2
          fi

      - name: Start Appium if not already listening
        shell: bash
        run: |
          set -euo pipefail
          BASE="${APPIUM_BASE_PATH:-/wd/hub}"
          PORT="${APPIUM_PORT:-4723}"
          STATUS_URL="http://127.0.0.1:${PORT}${BASE}/status"
          if curl -fsS "$STATUS_URL" >/dev/null 2>&1; then
            echo "Appium already listening at $STATUS_URL"
            exit 0
          fi
          echo "Starting Appium (port $PORT, base-path $BASE) ..."
          # Match java client default http://127.0.0.1:4723/wd/hub (BaseClass)
          if appium server --help >/dev/null 2>&1; then
            nohup appium server --address 127.0.0.1 --port "$PORT" --base-path "$BASE" > appium.log 2>&1 &
          else
            nohup appium --base-path "$BASE" > appium.log 2>&1 &
          fi
          for i in $(seq 1 30); do
            if curl -fsS "$STATUS_URL" >/dev/null 2>&1; then
              echo "Appium is ready."
              exit 0
            fi
            sleep 2
          done
          echo "::error::Appium did not become ready at $STATUS_URL (see appium.log)."
          tail -n 80 appium.log || true
          exit 1

      - name: Run TestNG suite (testng.xml)
        shell: bash
        run: |
          set -euo pipefail
          mvn -B -f appiumtests/pom.xml test -Dsurefire.suiteXmlFiles="${TESTNG_SUITE}"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appium-artifacts-self-hosted
          path: |
            appium.log
            appiumtests/test-output/**
            appiumtests/Screenshots/**
            appiumtests/target/surefire-reports/**
