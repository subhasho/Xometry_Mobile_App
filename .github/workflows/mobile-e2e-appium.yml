# Mobile E2E (Appium + TestNG)
#
# All Appium E2E in this workflow runs on a GitHub-hosted Android emulator (testng.xml: Tests + OPC).
#   • Required repo secret: APPIUM_E2E_APK_URL — direct HTTPS URL to the .apk.
#   • Optional repo variable: APPIUM_APP_PACKAGE / APPIUM_APP_ACTIVITY if they differ from defaults.
#
# Optional USB device (self-hosted): set RUN_SELF_HOSTED_DEVICE_E2E_ON_PUSH=true and run workflow_dispatch only.
#
# testng.xml: Tests.AppiumSuiteListener + alwaysRun on dependent tests.

name: Mobile E2E (Appium)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

# Latest run wins per ref on main (or manual group). cancel-in-progress avoids piling Queued push runs.
concurrency:
  group: mobile-e2e-appium-${{ github.ref }}-${{ github.event_name == 'workflow_dispatch' && 'manual' || 'ci' }}
  cancel-in-progress: true

env:
  TESTNG_SUITE: testng.xml

jobs:
  # ---------------------------------------------------------------------------
  # GitHub-hosted Android emulator — runs on every push to main (and manual dispatch).
  # ---------------------------------------------------------------------------
  appium-emulator-e2e:
    name: Appium E2E (Android emulator + testng.xml)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Maven and curl
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y maven curl

      - name: Compile tests (same as Main workflow)
        shell: bash
        run: mvn -B -f appiumtests/pom.xml test-compile

      - uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          arch: x86_64
          target: google_apis
          disable-animations: true
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          script: bash scripts/ci-emulator-e2e.sh
        env:
          APK_URL: ${{ secrets.APPIUM_E2E_APK_URL }}
          TESTNG_SUITE: ${{ env.TESTNG_SUITE }}
          APPIUM_APP_PACKAGE: ${{ vars.APPIUM_APP_PACKAGE }}
          APPIUM_APP_ACTIVITY: ${{ vars.APPIUM_APP_ACTIVITY }}
          APPIUM_ONLY_EMULATOR: "true"

      - name: Upload emulator artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appium-artifacts-emulator
          path: |
            appium.log
            appiumtests/test-output/**
            appiumtests/Screenshots/**
            appiumtests/target/surefire-reports/**

  # ---------------------------------------------------------------------------
  # Self-hosted + real USB phone — see docs/SELF_HOSTED_USB_PHONE.md
  # ---------------------------------------------------------------------------
  appium-self-hosted-device:
    name: Appium E2E (self-hosted + USB device, testng.xml)
    runs-on: self-hosted
    timeout-minutes: 120
    # Emulator is the default path; USB runs only when explicitly enabled + manual run.
    if: |
      github.event_name == 'workflow_dispatch' &&
      vars.RUN_SELF_HOSTED_DEVICE_E2E_ON_PUSH == 'true'
    env:
      # Optional overrides for BaseClass (see appiumtests/src/test/java/Tests/BaseClass.java)
      APPIUM_UDID: ${{ vars.APPIUM_UDID }}
      APPIUM_DEVICE_NAME: ${{ vars.APPIUM_DEVICE_NAME }}
      APPIUM_PLATFORM_NAME: ${{ vars.APPIUM_PLATFORM_NAME }}
      APPIUM_PLATFORM_VERSION: ${{ vars.APPIUM_PLATFORM_VERSION }}
      APK_PATH: ${{ vars.APK_PATH }}
      APPIUM_HOST: ${{ vars.APPIUM_HOST }}
      APPIUM_PORT: ${{ vars.APPIUM_PORT }}
      APPIUM_BASE_PATH: ${{ vars.APPIUM_BASE_PATH }}
      APPIUM_URL: ${{ secrets.APPIUM_URL }}
    steps:
      - uses: actions/checkout@v4

      - name: Why this job may not hit your phone every time (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          echo "::notice::Device E2E runs ONLY on self-hosted runners (this machine). GitHub-hosted ubuntu cannot use USB."
          echo "Runner: $RUNNER_NAME | OS=$RUNNER_OS | Event=$GITHUB_EVENT_NAME | Ref=$GITHUB_REF"

      - name: Why this job may not hit your phone every time (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          Write-Host "::notice::Device E2E runs ONLY on self-hosted runners (this machine). GitHub-hosted ubuntu cannot use USB."
          Write-Host "Runner=$env:RUNNER_NAME OS=$env:RUNNER_OS Event=$env:GITHUB_EVENT_NAME Ref=$env:GITHUB_REF"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run TestNG suite on device (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: bash scripts/run-appium-device-e2e.sh

      - name: Run TestNG suite on device (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          & powershell -NoProfile -ExecutionPolicy Bypass -File "$env:GITHUB_WORKSPACE\scripts\run-appium-device-e2e.ps1"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appium-artifacts-self-hosted
          path: |
            appium.log
            appiumtests/test-output/**
            appiumtests/Screenshots/**
            appiumtests/target/surefire-reports/**
