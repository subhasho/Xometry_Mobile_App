name: Mobile E2E (Appium)

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  gate:
    runs-on: ubuntu-latest
    outputs:
      run_tests: ${{ steps.flag.outputs.run_tests }}
    steps:
      - id: flag
        shell: bash
        run: |
          EVENT="${{ github.event_name }}"
          MSG="${{ github.event.head_commit.message || '' }}"
          TITLE="${{ github.event.pull_request.title || '' }}"
          TEXT="$MSG $TITLE"
          if [[ "$EVENT" == "workflow_dispatch" ]]; then
            echo "run_tests=true" >> "$GITHUB_OUTPUT"
          elif [[ "$TEXT" == *"[Run Tests]"* ]]; then
            echo "run_tests=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_tests=false" >> "$GITHUB_OUTPUT"
          fi
          echo "Event: $EVENT"
          echo "Trigger text: $TEXT"

  appium-tests:
    needs: gate
    if: needs.gate.outputs.run_tests == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      TESTNG_SUITE: testng.xml
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install adb
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y android-tools-adb

      - name: Ensure Appium + driver available (no reinstall if present)
        shell: bash
        continue-on-error: true
        run: |
          npm i -g appium@latest
          appium -v
          if ! appium driver list --installed | grep -q uiautomator2; then
            appium driver install uiautomator2
          fi

      - name: Verify device connected
        id: device
        shell: bash
        run: |
          set -e
          adb start-server || true
          DEVICES="$(adb devices)"
          echo "$DEVICES"
          if echo "$DEVICES" | grep -q $'\tdevice'; then
            echo "connected=true" >> "$GITHUB_OUTPUT"
          else
            echo "connected=false" >> "$GITHUB_OUTPUT"
            echo "No authorized Android device connected. Skipping tests gracefully."
          fi

      - name: Start Appium server
        id: appium
        if: ${{ steps.device.outputs.connected == 'true' }}
        shell: bash
        continue-on-error: true
        run: |
          nohup appium --base-path /wd/hub > appium.log 2>&1 &
          sleep 8
          if curl -fsS "http://127.0.0.1:4723/wd/hub/status" > /dev/null; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Appium tests (non-blocking)
        if: ${{ steps.device.outputs.connected == 'true' && steps.appium.outputs.ready == 'true' }}
        shell: bash
        continue-on-error: true
        run: |
          mvn -f appiumtests/pom.xml test -Dsurefire.suiteXmlFiles="${TESTNG_SUITE}"

      - name: Skip note when prerequisites unavailable
        if: ${{ steps.device.outputs.connected != 'true' || steps.appium.outputs.ready != 'true' }}
        shell: bash
        run: |
          echo "Skipping Appium tests because required runtime prerequisites are unavailable."

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appium-artifacts
          path: |
            appium.log
            appiumtests/test-output/**
            appiumtests/Screenshots/**
